name: Build Chromelevator as Static Library

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  workflow_dispatch:

jobs:
  build-lib:
    name: Build Chromelevator .lib (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - arch: x64
            msvc: x64
            libname: chromelevator_x64.lib
          - arch: arm64
            msvc: x64_arm64
            libname: chromelevator_arm64.lib

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc }}

      - name: Build as Static Library
        shell: cmd
        run: |
          call make.bat build_lib_only

      - name: Upload .lib
        uses: actions/upload-artifact@v4
        with:
          name: chromelevator-lib-${{ matrix.arch }}
          path: build/${{ matrix.libname }}
